[package]
name = "flare-core"
version = "0.1.0"
edition = "2021"
description = "Flare Core - 高性能、可靠的即时通讯长连接工具包"
keywords = ["instant-messaging", "long-connection", "reliable", "websocket", "quic", "tls"]
authors = ["Flare Team"]
license = "MIT"
repository = "https://github.com/flare-team/flare-core"
homepage = "https://flare-core.dev"
documentation = "https://docs.rs/flare-core"
readme = "README.md"

[[example]]
name = "compression_demo"
path = "examples/common/compression_demo.rs"

[[example]]
name = "ultra_low_latency_demo"
path = "examples/common/ultra_low_latency_demo.rs"

[[example]]
name = "quic_client"
path = "examples/client/quic_client.rs"

[[example]]
name = "quic_server" 
path = "examples/server/quic_server.rs"

[[example]]
name = "quick_test_quic_client"
path = "examples/client/quick_test_quic_client.rs"

[[example]]
name = "websocket_client"
path = "examples/client/websocket_client.rs"

[[example]]
name = "websocket_server"
path = "examples/server/websocket_server.rs"

[[example]]
name = "quick_test_client"
path = "examples/client/quick_test_client.rs"

[[example]]
name = "all_serializers_simple"
path = "examples/common/all_serializers_simple.rs"

[[example]]
name = "connection_serialization_demo"
path = "examples/common/connection_serialization_demo.rs"

[[example]]
name = "flexible_serializer_demo"
path = "examples/common/flexible_serializer_demo.rs"

[[example]]
name = "optimized_ultra_low_latency_demo"
path = "examples/common/optimized_ultra_low_latency_demo.rs"

[[example]]
name = "serialization_without_stats"
path = "examples/common/serialization_without_stats.rs"

[[example]]
name = "protobuf_serialization_demo"
path = "examples/common/protobuf_serialization_demo.rs"

[[example]]
name = "quic_protobuf_test"
path = "examples/common/quic_protobuf_test.rs"

[dependencies]
# 异步运行时（核心功能）
tokio = { version = "1.39.2", features = ["rt-multi-thread", "sync", "time", "macros", "net", "signal"] }

# 序列化（协议需要）
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
bincode = "1.3.3"
# Protobuf支持
prost = "0.13.0"
prost-types = "0.13.0"

# 网络相关（默认可用）
quinn = "0.11.8"
tokio-tungstenite = { version = "0.27.0", features = ["native-tls"] }

# TLS（与网络功能配合）
rustls = { version = "0.23.31", features = ["ring"] }
rustls-pemfile = "2.2.0"
rustls-native-certs = "0.8.1"
tokio-native-tls = "0.3.1"

# 时间处理（连接管理需要）
chrono = { version = "0.4.38", features = ["serde"] }

# 日志（调试和监控）
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"], optional = true }

# 错误处理（核心功能）
thiserror = "2.0.15"

# 异步trait（连接接口需要）
async-trait = "0.1.83"

# 全局静态变量（工厂模式需要）
lazy_static = "1.5.0"

# 压缩算法库
lz4_flex = "0.11.3"
snap = "1.1.1"
flate2 = "1.0.28"

# 随机数生成（测试用）
fastrand = "2.0"

# 流处理（WebSocket 需要）
futures-util = "0.3.30"

# 网络地址（配置需要）
url = "2.5.0"

# MessagePack支持
rmp-serde = "1.3.0"
# CBOR支持
serde_cbor = "0.11.2"

[build-dependencies]
prost-build = "0.13.0"

[features]
# 默认功能
default = ["logging"]
# 日志功能
logging = ["tracing-subscriber"]
# 完整功能（现在默认包含所有网络功能）
full = ["logging"]

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"