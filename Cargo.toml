[package]
name = "flare-core"
version = "0.1.0"
edition = "2021"
description = "Flare Core - 高性能、可靠的即时通讯长连接工具包"
keywords = ["websocket", "quic"]
authors = ["Flare Team"]
license = "MIT"
repository = "https://github.com/flare-team/flare-core"
homepage = "https://flare-core.dev"
documentation = "https://docs.rs/flare-core"
readme = "README.md"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.23.0", features = ["native-tls"] }
futures-util = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
prost = "0.14"
bytes = "1"
async-trait = "0.1"
quinn = "0.11"

[build-dependencies]
prost-build = "0.14"

[features]
default = []