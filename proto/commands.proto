syntax = "proto3";

package flare.core.commands;

// Command anvelope, wrapping specific commands
message Command {
    oneof command {
        SendMessage sendMessage = 1;
        AckMessage ackMessage = 2;
        InitConnection initConnection = 3;
        CloseConnection closeConnection = 4;
        HeartbeatRequest heartbeatRequest = 5;
        HeartbeatResponse heartbeatResponse = 6;
    }
}

// Command to send a message
message SendMessage {
    string topic = 1;
    bytes payload = 2;
    uint64 message_id = 3;
}

// Acknowledgment for a message
message AckMessage {
    uint64 message_id = 1;
    bool success = 2;
    string error_message = 3;
}

// Initialize a connection
message InitConnection {
    string client_id = 1;
    // other handshake parameters
}

// Close a connection
message CloseConnection {
    int32 reason_code = 1;
    string reason_message = 2;
}

// Heartbeat request
message HeartbeatRequest {
    uint64 timestamp = 1;
}

// Heartbeat response
message HeartbeatResponse {
    uint64 timestamp = 1;
}