syntax = "proto3";

package flare.core;

import "commands.proto";

// 统一的消息帧，用于封装所有传输层消息
message Frame {
    // 消息序列号，用于请求-响应匹配
    uint64 sequence = 1;
    
    // 消息类型，用于区分不同类型的消息
    // 0: Heartbeat, 1: Handshake, 2: Data, 3: Close
    uint32 type = 2;
    
    // 消息体，可以是任何类型的 Protobuf 消息
    oneof payload {
        commands.Command command = 3;
    }
}