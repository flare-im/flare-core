syntax = "proto3";

package flare.core;

message Frame {
  MessageType message_type = 1;
  uint64 message_id = 2;
  Reliability reliability = 3;
  uint64 timestamp = 4;
  bytes payload = 5;
  optional string session_id = 6;
  uint32 priority = 7;
  optional uint32 compression = 8;
  bool encrypted = 9;
}

enum MessageType {
  UNKNOWN = 0;
  HEARTBEAT = 1;
  HEARTBEAT_ACK = 2;
  CONNECT = 3;
  CONNECT_ACK = 4;
  DISCONNECT = 5;
  DISCONNECT_ACK = 6;
  DATA = 7;
  DATA_ACK = 8;
  RETRANSMIT = 9;
  PROTOCOL_SWITCH = 10;
  PROTOCOL_TEST = 11;
  ERROR = 12;
  NOTIFICATION = 13;
  CUSTOM_EVENT = 17;
  CUSTOM_MESSAGE = 18;
}

enum Reliability {
  BEST_EFFORT = 0;
  AT_LEAST_ONCE = 1;
  EXACTLY_ONCE = 2;
  ORDERED = 3;
}