// Frame Protocol Definition
// Author: Flare Core Team
// Description: Core message frame structure for reliable long-connection communication

syntax = "proto3";

// Package definition for the Flare core messaging system
package flare.core;

// Frame represents a unified message structure for all communication
// It contains all necessary metadata and the actual payload
message Frame {
  // Type of the message (e.g., heartbeat, data, control)
  MessageType message_type = 1;
  
  // Unique identifier for the message (used for acknowledgment and deduplication)
  uint64 message_id = 2;
  
  // Reliability level of the message (best effort, at least once, exactly once, ordered)
  Reliability reliability = 3;
  
  // Timestamp when the message was created (milliseconds since Unix epoch)
  uint64 timestamp = 4;
  
  // Actual message payload as bytes (can be serialized data of any format)
  bytes payload = 5;
  
  // Optional session identifier for grouping related messages
  optional string session_id = 6;
  
  // Message priority level (0-255, higher values indicate higher priority)
  uint32 priority = 7;
  
  // Optional compression algorithm identifier (if payload is compressed)
  optional uint32 compression = 8;
  
  // Flag indicating whether the payload is encrypted
  bool encrypted = 9;
}

// MessageType defines all possible types of messages in the protocol
enum MessageType {
  // Unknown message type (should not be used in normal operation)
  UNKNOWN = 0;
  
  // Heartbeat messages for connection keep-alive
  HEARTBEAT = 1;
  HEARTBEAT_ACK = 2;
  
  // Connection establishment and acknowledgment
  CONNECT = 3;
  CONNECT_ACK = 4;
  
  // Connection termination and acknowledgment
  DISCONNECT = 5;
  DISCONNECT_ACK = 6;
  
  // Data transmission and acknowledgment
  DATA = 7;
  DATA_ACK = 8;
  
  // Retransmission of previously sent data
  RETRANSMIT = 9;
  
  // Protocol switching control messages
  PROTOCOL_SWITCH = 10;
  
  // Protocol testing messages
  PROTOCOL_TEST = 11;
  
  // Error reporting messages
  ERROR = 12;
  
  // Notification messages
  NOTIFICATION = 13;
  
  // Custom event messages (application-defined)
  CUSTOM_EVENT = 17;
  
  // Custom message types (application-defined)
  CUSTOM_MESSAGE = 18;
}

// Reliability defines the delivery guarantees for messages
enum Reliability {
  // Best effort delivery (no guarantees)
  BEST_EFFORT = 0;
  
  // At least once delivery (message may be duplicated but not lost)
  AT_LEAST_ONCE = 1;
  
  // Exactly once delivery (message delivered exactly one time)
  EXACTLY_ONCE = 2;
  
  // Ordered delivery (messages delivered in order)
  ORDERED = 3;
}