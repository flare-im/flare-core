// Commands Protocol Definition
// Author: Flare Core Team
// Description: Core command structures for reliable long-connection communication

syntax = "proto3";

// Package definition for the Flare core command system
package flare.core.commands;

// 长链接大类命令
message Command {
  oneof command_type {
    ControlCmd control = 1;
    MessageCmd message = 2;
    NotificationCmd notification = 3;
    EventCmd event = 4;
  }
}

// 控制类子命令
message ControlCmd {
  oneof control_type {
    ConnectCommand connect = 1;
    ConnectAckCommand connect_ack = 2;
    DisconnectCommand disconnect = 3;
    AuthRequestCommand auth_request = 4;
    AuthResponseCommand auth_response = 5;
    PingCommand ping = 6;
    PongCommand pong = 7;
    ErrorCommand error = 8;
    CustomCommand custom = 9;
  }
}

// 消息类子命令（需要ACK确认）
message MessageCmd {
  oneof message_type {
    MessageSendCommand send = 1;
    MessageAckCommand ack = 2;
    DataCommand data = 3;
    CustomCommand custom = 4;
  }
}

// 通知类子命令
message NotificationCmd {
  oneof notification_type {
    NotificationCommand system = 1;
    NotificationCommand broadcast = 2;
    NotificationCommand alert = 3;
    CustomCommand custom = 4;
  }
}

// 事件类子命令
message EventCmd {
  oneof event_type {
    OpenCommand open = 1;
    CloseCommand close = 2;
    ReconnectCommand reconnect = 3;
    CustomCommand custom = 4;
  }
}

// 自定义命令结构
message CustomCommand {
  string name = 1;
  bytes data = 2;
  map<string, string> metadata = 3;
}

// 连接命令
message ConnectCommand {
  string client_id = 1;
  string protocol = 2;
  string platform = 3;
  string version = 4;
}

// 连接确认命令
message ConnectAckCommand {
  int32 status = 1;
  string status_message = 2;
  string session_id = 3;
}

// 断开连接命令
message DisconnectCommand {
  int32 status = 1;
  string reason = 2;
  string details = 3;
}

// 认证请求命令
message AuthRequestCommand {
  string user_id = 1;
  string platform = 2;
  string token = 3;
}

// 认证响应命令
message AuthResponseCommand {
  int32 status = 1;
  string status_message = 2;
  bool success = 3;
  bytes user_info = 4;
  string error_message = 5;
}

// 消息发送命令
message MessageSendCommand {
  bytes data = 1;
}

// 消息确认命令
message MessageAckCommand {
  int32 status = 1;
  string status_message = 2;
  bool success = 3;
  string message_id = 4;
  uint32 error_code = 5;
  string error_message = 6;
}

// 数据命令
message DataCommand {
  bytes data = 1;
}

// 通知命令
message NotificationCommand {
  string content = 1;
  string notification_type = 2;
}

// 错误命令
message ErrorCommand {
  int32 status = 1;
  string message = 2;
  string reason = 3;
  string details = 4;
}

// 事件命令
message PingCommand {}
message PongCommand {}
message OpenCommand {}
message CloseCommand {}
message ReconnectCommand {}